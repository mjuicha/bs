# Google OAuth callback - disable WAF engine for this path only
SecRule REQUEST_URI "@beginsWith /api/auth/google/callback" \
    "id:9700030,phase:1,pass,nolog,ctl:ruleEngine=Off"

SecRule REQUEST_URI "@beginsWith /api/auth/" \
    "id:9700010,phase:1,pass,nolog,\
    ctl:ruleRemoveTargetById=930100;ARGS:redirect_uri,\
    ctl:ruleRemoveTargetById=930110;ARGS:redirect_uri,\
    ctl:ruleRemoveTargetById=930120;ARGS:redirect_uri,\
    ctl:ruleRemoveTargetById=930100;ARGS:iss,\
    ctl:ruleRemoveTargetById=930110;ARGS:iss,\
    ctl:ruleRemoveTargetById=930120;ARGS:iss,\
    ctl:ruleRemoveTargetById=930100;ARGS:code,\
    ctl:ruleRemoveTargetById=930110;ARGS:code,\
    ctl:ruleRemoveTargetById=930100;ARGS:scope,\
    ctl:ruleRemoveTargetById=930110;ARGS:scope,\
    ctl:ruleRemoveTargetById=942100;ARGS:state,\
    ctl:ruleRemoveTargetById=942200;ARGS:state,\
    ctl:ruleRemoveTargetById=949110;ARGS,\
    ctl:ruleRemoveById=949110"
