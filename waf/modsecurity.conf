# ─── ModSecurity Override Configuration ────────────────────────
# Strict WAF settings for ft_transcendence

# Enable ModSecurity engine in blocking mode
SecRuleEngine On

# Enable audit logging for security events
SecAuditEngine RelevantOnly
SecAuditLog /var/log/modsecurity/audit.log
SecAuditLogType Serial
SecAuditLogParts ABIJDEFZ

# Request body handling
SecRequestBodyAccess On
SecRequestBodyLimit 20971520
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject

# Response body handling
SecResponseBodyAccess On
SecResponseBodyMimeType text/plain text/html text/xml application/json
SecResponseBodyLimit 1048576
SecResponseBodyLimitAction ProcessPartial

# Temp file locations
SecTmpDir /tmp/
SecDataDir /tmp/

# ─── OAuth / Google Auth Exclusions ───────────────────────────
# Disable WAF entirely for auth endpoints - OAuth redirects contain URLs that trigger LFI rules

SecRule REQUEST_URI "@beginsWith /api/auth/" \
    "id:70010,phase:1,pass,ctl:RuleEngine=Off,log"

SecRule REQUEST_URI "@beginsWith /auth/" \
    "id:70011,phase:1,pass,ctl:RuleEngine=Off,log"

# ─── HTTP Method Restrictions ──────────────────────────────────

# Block dangerous HTTP methods
SecRule REQUEST_METHOD "!@within GET|POST|PUT|PATCH|DELETE|HEAD|OPTIONS" \
    "id:90001,phase:1,log,deny,status:405,msg:'Method not allowed'"

# ─── Disable CRS for API endpoints ────────────────────────────────

# Disable all CRS rules for notification endpoints
SecRule REQUEST_URI "@beginsWith /api/notifications" \
    "id:70000,phase:1,pass,ctl:RuleEngine=Off,nolog"

SecRule REQUEST_URI "@beginsWith /api/notifications" \
    "id:70001,phase:2,pass,ctl:RuleEngine=Off,nolog"

# ─── Brute Force Protection ──────────────────────────────────

# Track failed login attempts (rate limit auth endpoints)
SecAction "id:90010,phase:1,pass,initcol:ip=%{REMOTE_ADDR},initcol:global=tx"
SecAction "id:90011,phase:1,pass,initcol:global=tx"

# Block after 10 failed login attempts within 5 minutes
SecRule IP:BLOCK "@eq 1" \
    "id:90020,phase:1,deny,status:429,msg:'IP blocked due to too many failed attempts',logdata:'%{REMOTE_ADDR}'"

# ─── Bot Detection ────────────────────────────────────────────

# Block requests without User-Agent (common bots)
SecRule REQUEST_HEADERS:User-Agent "@rx ^$" \
    "id:90030,phase:1,log,deny,status:403,msg:'Request missing User-Agent header'"

# Block known bad bot patterns
SecRule REQUEST_HEADERS:User-Agent "@rx (masscan|nmap|massploit|sqlmap|nikto|gobuster|dirbuster|hydra|burp|scanner|bot|crawl|spider|libwww-perl|python-requests|curl|wget)" \
    "id:90031,phase:1,log,deny,status:403,msg:'Blocked known malicious bot or scanner'"

# Block proxy requests
SecRule REQUEST_HEADERS:Proxy "^.$" \
    "id:90032,phase:1,log,deny,status:403,msg:'Proxy request blocked'"

# Block requests with suspicious X-Forwarded-For patterns
SecRule REQUEST_HEADERS:X-Forwarded-For "@rx (\d+\.){3}\d+,\s*(\d+\.){3}\d+" \
    "id:90033,phase:1,log,deny,status:403,msg:'Suspicious X-Forwarded-For header'"

# ─── File Upload Validation ───────────────────────────────────

# Block executable file uploads
SecRule REQUEST_URI "@rx /api/(upload|profile/avatar|chat/attachment)" \
    "id:90040,phase:1,pass,chain"
SecRule FILES_TMP_CONTENT "@rx (?i)(<\?php|<\?=|<!DOCTYPE|eval\(|base64_decode|shell_exec|system\(|passthru|popen|proc_open|exec|assert)" \
    "id:90041,phase:2,log,deny,status:403,msg:'Executable content detected in file upload'"

# ─── SQL Injection Protection ─────────────────────────────────

# Additional SQLi protection for common attack patterns
SecRule ARGS "@rx (?i)(union\s+select|select\s+.*\s+from|insert\s+into|drop\s+table|update\s+.*\s+set|delete\s+from|exec\s*\(|execute\s*\(|xp_cmdshell)" \
    "id:90050,phase:2,log,deny,status:403,msg:'SQL Injection attempt detected'"

# ─── XSS Protection ───────────────────────────────────────────

# Block common XSS patterns in arguments
SecRule ARGS "@rx (?i)<script[^>]*>|javascript:|on\w+\s*=|<\s*iframe|<\s*object|<\s*embed|<\s*link|<\s*style" \
    "id:90060,phase:2,log,deny,status:403,msg:'XSS attempt detected'"

# ─── Rate Limiting ────────────────────────────────────────────

# Limit request size to prevent DoS
SecRule REQUEST_LENGTH "@gt 10485760" \
    "id:90070,phase:1,log,deny,status:413,msg:'Request too large'"

# ─── Minimal Checks ──────────────────────────────────────────

# Allow OPTIONS preflight
SecRule REQUEST_METHOD "@streq OPTIONS" \
    "id:60011,phase:1,pass,nolog"

# Block TRACE method explicitly
SecRule REQUEST_METHOD "@streq TRACE" \
    "id:60012,phase:1,deny,status:405,msg:'TRACE method not allowed'"
