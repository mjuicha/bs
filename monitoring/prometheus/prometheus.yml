global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  # ─── Backend (NestJS) metrics ─────────────────────────────
  # Uncomment when backend exposes /api/metrics in Prometheus format
  # - job_name: "backend"
  #   metrics_path: "/api/metrics"
  #   static_configs:
  #     - targets: ["backend:3001"]
  #       labels:
  #         service: "backend"

  # ─── nginx stub_status metrics ────────────────────────────
  # Note: stub_status is not Prometheus format
  # For proper metrics, add nginx-prometheus-exporter sidecar
  # - job_name: "nginx"
  #   metrics_path: "/metrics"
  #   static_configs:
  #     - targets: ["nginx:80"]
  #       labels:
  #         service: "nginx"

  # ─── Prometheus self-monitoring ───────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"
