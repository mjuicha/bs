services:
  # ─── WAF / ModSecurity ─────────────────────────────────────────
  waf:
    build:
      context: ./waf
      dockerfile: Dockerfile
    container_name: ft_waf
    ports:
      - "${NGINX_HTTP_PORT:-8080}:8080"
      - "${NGINX_HTTPS_PORT:-8443}:8443"
    environment:
      BACKEND: http://nginx:80
      BACKEND_SSL: http://nginx:443
      PORT: 8080
      SSL_PORT: 8443
      ANOMALY_INBOUND: 5
      ANOMALY_OUTBOUND: 5
    depends_on:
      nginx:
        condition: service_started
    volumes:
      - waf_certs:/etc/nginx/certs
    networks:
      - app-network
    restart: unless-stopped
    env_file: .env

  # ─── Reverse Proxy (nginx) ────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ft_nginx
    # No external port - all traffic goes through WAF
    expose:
      - "80"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    env_file: .env

  # ─── Frontend (Next.js) ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ft_frontend
    ports:
      - "3010:3000"
    networks:
      - app-network
    restart: unless-stopped
    env_file: .env

  # ─── Backend (NestJS) ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ft_backend
    ports:
      - "${BACKEND_PORT:-3001}:${BACKEND_PORT:-3001}"
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "-q",
          "http://localhost:${BACKEND_PORT:-3001}/api/health",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - app-network
    restart: unless-stopped
    env_file: .env

  # ─── PostgreSQL ──────────────────────────────────────────────
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    container_name: ft_postgres
    # No external port exposure for security - only internal access
    expose:
      - "5432"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-transcendence}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-transcendence_password}
      POSTGRES_DB: ${POSTGRES_DB:-transcendence}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-transcendence} -d ${POSTGRES_DB:-transcendence}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    env_file: .env

  # ─── HashiCorp Vault ─────────────────────────────────────────
  vault:
    build:
      context: ./vault
      dockerfile: Dockerfile
    container_name: ft_vault
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    volumes:
      - vault_data:/vault/data
    networks:
      - app-network
    restart: unless-stopped
    env_file: .env

  # ─── Prometheus ──────────────────────────────────────────────
  prometheus:
    build:
      context: ./monitoring/prometheus
      dockerfile: Dockerfile
    container_name: ft_prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    networks:
      - app-network
    restart: unless-stopped

  # ─── Grafana ─────────────────────────────────────────────────
  grafana:
    build:
      context: ./monitoring/grafana
      dockerfile: Dockerfile
    container_name: ft_grafana
    ports:
      - "3100:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - app-network
    restart: unless-stopped
    env_file: .env

# ─── Named Volumes ──────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local
  waf_certs:
    driver: local
  vault_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ─── Networks ────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge
